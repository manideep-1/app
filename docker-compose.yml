# ifelse - backend + MongoDB for local/production-like runs
services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      DB_NAME: ifelse_db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGINS: "*"
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
